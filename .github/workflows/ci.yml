name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type check
        run: mypy
      - name: Unit tests
        run: PYTHONPATH=src pytest -m 'not airflow'
      - name: Validate active component manifest
        run: PYTHONPATH=src python scripts/check_active_components.py
      - name: Validate Compose
        run: make compose-config
      - name: Build Airflow image
        run: make image
      - name: Build WeChat sender image
        run: make sender-image
      - name: Airflow 3 DAG imports
        run: make test-dags
