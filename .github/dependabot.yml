version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-runtime:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: docker
    directory: /docker/airflow
    schedule:
      interval: monthly
  - package-ecosystem: docker
    directory: /docker/sender
    schedule:
      interval: monthly
