name: wechat-on-airflow

x-common: &common
  restart: unless-stopped
  networks:
    - airflow-network
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: "5"
      compress: "true"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY is required}
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Shanghai
  AIRFLOW__CORE__PARALLELISM: "32"
  AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "16"
  AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "8"
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DATABASE_USERNAME:-airflow}:${AIRFLOW_DATABASE_PASSWORD:?AIRFLOW_DATABASE_PASSWORD is required}@postgresql:5432/${AIRFLOW_DATABASE_NAME:-airflow}
  AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "false"
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_DATABASE_USERNAME:-airflow}:${AIRFLOW_DATABASE_PASSWORD:?AIRFLOW_DATABASE_PASSWORD is required}@postgresql:5432/${AIRFLOW_DATABASE_NAME:-airflow}
  AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
  AIRFLOW__CELERY__WORKER_CONCURRENCY: "16"
  AIRFLOW__CELERY__WORKER_AUTOSCALE: 16,4
  AIRFLOW__CELERY__WORKER_MAX_MEMORY_PER_CHILD: "512000"
  AIRFLOW__CELERY__OPERATION_TIMEOUT: "1800"
  AIRFLOW__CELERY_BROKER_TRANSPORT_OPTIONS__VISIBILITY_TIMEOUT: ${AIRFLOW_CELERY_VISIBILITY_TIMEOUT_SECONDS:-86400}
  AIRFLOW__API__BASE_URL: ${AIRFLOW_BASE_URL:-http://localhost:8080}
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:?AIRFLOW_API_SECRET_KEY is required}
  AIRFLOW__API__EXPOSE_CONFIG: "false"
  AIRFLOW__API__EXPOSE_STACKTRACE: "false"
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:?AIRFLOW_JWT_SECRET is required}
  AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW_BASE_URL:-http://localhost:8080}
  AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.session,airflow.providers.fab.auth_manager.api.auth.backend.basic_auth
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
  AIRFLOW__LOGGING__FAB_LOGGING_LEVEL: WARNING
  TZ: Asia/Shanghai

x-airflow-common: &airflow-common
  <<: *common
  image: ${AIRFLOW_IMAGE_NAME:-wechat-on-airflow:3.3.0}
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment: *airflow-env
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags:ro
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
  depends_on:
    postgresql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgresql:
    <<: *common
    image: bitnami/postgresql@sha256:db9bc963e434771f650d4506b5a631c6126525c8be0c9b7c0ec61228a632c33f
    environment:
      POSTGRESQL_DATABASE: ${AIRFLOW_DATABASE_NAME:-airflow}
      POSTGRESQL_USERNAME: ${AIRFLOW_DATABASE_USERNAME:-airflow}
      POSTGRESQL_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:?AIRFLOW_DATABASE_PASSWORD is required}
    volumes:
      - ./database/postgresql:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DATABASE_USERNAME:-airflow} -d ${AIRFLOW_DATABASE_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    <<: *common
    image: bitnami/redis@sha256:660edb35a17e1c954be0845fed4ecca3183a7e6e0bf322ad20f997e45d750d5f
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - ./database/redis:/bitnami
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-migrate:
    <<: *airflow-common
    profiles: [maintenance]
    restart: "no"
    environment:
      <<: *airflow-env
      AIRFLOW__DATABASE__MIGRATION_BATCH_SIZE: ${AIRFLOW_MIGRATION_BATCH_SIZE:-20000000}
    command: db migrate

  airflow-create-admin:
    <<: *airflow-common
    profiles: [maintenance]
    restart: "no"
    command:
      - users
      - create
      - --username
      - ${AIRFLOW_USERNAME:-airflow}
      - --password
      - ${AIRFLOW_PASSWORD:?AIRFLOW_PASSWORD is required}
      - --firstname
      - Airflow
      - --lastname
      - Admin
      - --role
      - Admin
      - --email
      - ${AIRFLOW_EMAIL:-airflow@example.com}

  airflow-cli:
    <<: *airflow-common
    profiles: [debug]
    restart: "no"
    entrypoint: airflow
    command: version

  log-cleaner:
    <<: *common
    image: alpine:3.22.1
    volumes:
      - ./logs:/logs
    command:
      - sh
      - -c
      - |
        while true; do
          find /logs -type f -name '*.log' -mtime +7 -delete
          find /logs -type d -empty -delete
          sleep 86400
        done

networks:
  airflow-network:
    driver: bridge
