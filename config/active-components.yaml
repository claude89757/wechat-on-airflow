schema_version: 1
observed_at: "2026-07-19T01:33:00+08:00"
production:
  repository_path: /root/wechat-on-airflow
  deployment_policy: exact_local_head
  current_airflow: "3.3.0"
  target_airflow: "3.3.0"
  python: "3.12"
  executor: CeleryExecutor
  metadata_database: PostgreSQL 17
  broker: Redis
  variable_values_documented: false
  connection_values_documented: false

shared_contracts:
  venue_email:
    modules:
      - wechat_airflow.notifications.email
      - wechat_airflow.clients.tencent_ses
    variables:
      - EMAIL_SEND_FALLBACK_OUTBOX
      - EMAIL_SEND_FALLBACK_MAX_ITEMS
      - TENCENT_CLOUD_SECRET_ID
      - TENCENT_CLOUD_SECRET_KEY
      - VENUE_EMAIL_FROM_ADDRESS
      - VENUE_EMAIL_REPLY_TO
      - VENUE_EMAIL_TEMPLATE_ID
    invariants:
      - failures_do_not_fail_venue_dag
      - recipient_lists_are_venue_specific
      - no_real_delivery_in_tests
  wechat_delivery:
    modules:
      - wechat_airflow.notifications.wechat
    variables:
      - WECHAT_SEND_API_URL
      - WECHAT_SEND_DEVICE_NAME
      - WECHAT_SEND_TIMEOUT_SECONDS
      - WECHAT_SEND_RETRY_COUNT
      - WECHAT_SEND_RETRY_DELAY_SECONDS
      - WECHAT_SEND_FALLBACK_OUTBOX
      - WECHAT_SEND_FALLBACK_MAX_ITEMS
    invariants:
      - failures_are_isolated_per_chat
      - email_delivery_is_independent
      - no_real_delivery_in_tests

active_dags:
  - dag_id: HTTPS可用代理巡检
    file: dags/tennis_dags/proxy_tools/https_proxy_watcher.py
    schedule: "*/5 * * * *"
    tasks:
      - check_proxies
    variables:
      - GIT_TOKEN
    connections: []
    direct_modules:
      - wechat_airflow.proxy_tools.https_proxy_watcher
    external_services:
      - github_api
      - public_proxy_sources
      - baidu
    notifications: []
    purpose: Refresh the shared HTTPS proxy list in a separate GitHub repository.
    verification:
      - dag_imports
      - latest_run_succeeds
      - outbound_requests_have_timeouts

  - dag_id: HTTPS可用代理巡检_ydmap
    file: dags/tennis_dags/proxy_tools/ydmap_https_proxy_watcher.py
