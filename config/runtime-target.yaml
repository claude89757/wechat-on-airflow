schema_version: 1
target:
  airflow: "3.3.0"
  python: "3.12"
  executor: CeleryExecutor
  dag_distribution: image
  execution_api_server_url_env: AIRFLOW_EXECUTION_API_SERVER_URL
  auth_manager: FabAuthManager
  base_image: apache/airflow:3.3.0-python3.12@sha256:b572e9241d7b09b295c9ea97adeb7b3dfc932e2fbcdebec59256dad69061bb29
  providers:
    apache-airflow-providers-celery: "3.21.0"
    apache-airflow-providers-fab: "3.7.1"
    apache-airflow-providers-redis: "4.5.0"
    apache-airflow-providers-standard: "1.15.0"
  services:
    - airflow-api-server
    - airflow-scheduler
    - airflow-dag-processor
    - airflow-worker
    - airflow-triggerer
    - postgresql
    - redis
  database:
    engine: PostgreSQL
    major_version: 17
    deployment_strategy: fresh_database
    preserve_airflow2_database: true
    minimum_free_bytes: 8000000000
    volumes:
      postgresql_env: AIRFLOW_POSTGRESQL_VOLUME
      redis_env: AIRFLOW_REDIS_VOLUME
      logs_env: AIRFLOW_LOGS_VOLUME
  broker:
    engine: Redis
    visibility_timeout_seconds: 86400
images:
  postgresql: bitnami/postgresql@sha256:42a8200d35971f931b869ef5252d996e137c6beb4b8f1b6d2181dc7d1b6f62e0
  redis: bitnami/redis@sha256:1c41e7028ac48d7a9d79d855a432eef368aa440f37c8073ae1651879b02c72f4
  wechat_sender_base: python@sha256:804ddf3251a60bbf9c92e73b7566c40428d54d0e79d3428194edf40da6521286
managed_services:
  wechat_sender:
    runtime: systemd
    service_unit: deploy/systemd/wechat-sender.service
    install_script: scripts/install_wechat_sender.sh
    compose_file: docker-compose.sender.yml
    health_endpoint: /healthz
    endpoint_variable: WECHAT_SEND_API_URL
    readiness_path: /readyz
    deployment_owner: android_device_host
    workers_per_device: 1
maintenance:
  airflow_metadata_cleanup:
    command: scripts/airflow_db_cleanup.py
    execution_owner: deployment_manager
    mode: manual
    retention_days: 180
    apply_requires_human_approval: true
    scheduled: false
verification:
  required_commands:
    - make verify
    - make deploy
    - make test-dags
    - make deploy-check
    - make rollback-check
    - make db-cleanup-check
  production_cycles: 3
  notification_failure_grace_minutes: 30
